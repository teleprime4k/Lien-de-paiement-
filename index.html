<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Paiement VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation d'apparition douce */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

/* Conteneur de l'alerte */
        #alertMessage {
            position: fixed;
            top: -100px; /* Caché au début pour l'animation */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px; /* Plus large pour les TV/Tablettes */
            background: var(--alert-bg);
            backdrop-filter: blur(10px);
            color: var(--text-dark);
            padding: 20px 25px;
            border-radius: 16px;
            border: 1px solid rgba(9, 198, 37, 0.2);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            box-shadow: var(--shadow);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            overflow: hidden;
        }

        #alertMessage.show {
            top: 5%; /* Position relative au haut de l'écran */
        }

        #alertMessage.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px) scale(0.95);
        }

        /* Icône adaptable */
        .alert-icon {
            font-size: 3rem;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Texte adaptable */
        .alert-content {
            flex-grow: 1;
            line-height: 1.4;
            font-size: 1.2rem; /* Taille de base plus grande pour TV */
            color: var(--text-body); 
        }

        .alert-content strong {
            color: var(--accent-color);
            display: block;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        /* Barre de progression temporelle */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--accent-color);
            width: 100%;
            transform-origin: left;
        }

        @keyframes shrink {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* --- ADAPTATIONS SPECIFIQUES --- */

        /* Tablettes (Écrans moyens) */
        @media (max-width: 1024px) {
            #alertMessage {
                width: 80%;
                padding: 20px;
            }
            .alert-content { font-size: 1.1rem; }
            .alert-content strong { font-size: 1.3rem; }
        }

        /* Téléphones (Petits écrans) */
        @media (max-width: 600px) {
            #alertMessage {
                width: 92%;
                padding: 15px;
                gap: 12px;
                border-radius: 15px;
            }
            .alert-icon { font-size: 2rem; }
            .alert-content { font-size: 0.95rem; }
            .alert-content strong { font-size: 1.1rem; }
        }

        /* Télévisions (Grand écrans & recul) */
        @media (min-width: 1900px) {
            #alertMessage {
                max-width: 1000px;
                padding: 40px;
                border-radius: 30px;
            }
            .alert-icon { font-size: 4rem; }
            .alert-content { font-size: 1.6rem; }
            .alert-content strong { font-size: 2.2rem; }
            .progress-bar { height: 10px; }
        }

        
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

    <button onclick="openPaymentModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 px-8 rounded-2xl shadow-xl shadow-yellow-500/20 transition-all transform hover:scale-105 active:scale-95 uppercase tracking-wider">
        💎 Je demande mon Lien de paiement
    </button>

    <div id="paymentModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#1e293b] border border-white/10 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl relative animate-fade-in">
            
            <button onclick="closePaymentModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white text-2xl transition-colors">&times;</button>
            
            <h2 class="text-2xl font-bold text-white mb-2">Lien de paiement  💳</h2>
            <p class="text-gray-400 text-sm mb-6">Entrez votre email pour recevoir votre lien.</p>
            
            <form id="paymentForm" action="https://formspree.io/f/xbdazkbd" method="POST" class="space-y-4">
                <div class="relative">
                    <input type="email" name="email" id="userEmail" required placeholder="votre@email.com" 
                        class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-yellow-500 transition-colors placeholder:text-gray-600">
                </div>
                
                <input type="hidden" name="_subject" value="Nouvelle demande de lien de paiement VIP">

                <button type="submit" id="btnSubmitPayment" class="w-full bg-yellow-500 text-black font-extrabold py-3 rounded-xl hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-500/10">
                    Envoyer ma demande
                </button>
            </form>

            <p id="statusMsg" class="mt-4 text-center text-sm hidden font-medium"></p>
        </div>
    </div>

    <script>
        // Fonctions pour ouvrir/fermer la fenêtre
        window.openPaymentModal = () => {
            const modal = document.getElementById('paymentModal');
            if(modal) {
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Empêche le scroll en arrière-plan
            }
        };

        window.closePaymentModal = () => {
            const modal = document.getElementById('paymentModal');
            if(modal) {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto'; // Réactive le scroll
            }
        };

        // Fermer la modal si on clique en dehors du carré gris
        window.onclick = function(event) {
            const modal = document.getElementById('paymentModal');
            if (event.target == modal) {
                closePaymentModal();
            }
        }

        const form = document.getElementById("paymentForm");

        async function handleSubmit(event) {
            event.preventDefault();
            const status = document.getElementById("statusMsg");
            const btn = document.getElementById("btnSubmitPayment");
            const data = new FormData(event.target);

            btn.disabled = true;
            btn.innerText = "Envoi en cours...";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    status.innerText = "✅ Demande reçue ! On vous contacte par mail.";
                    status.className = "mt-4 text-center text-sm text-green-400 font-medium";
                    status.classList.remove('hidden');
                    form.reset();
                    
                    // Fermeture automatique après 3 secondes
                    setTimeout(() => {
                        closePaymentModal();
                        status.classList.add('hidden');
                        btn.disabled = false;
                        btn.innerText = "Envoyer ma demande";
                    }, 3000);
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.innerText = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.innerText = "❌ Erreur lors de l'envoi.";
                        }
                        status.className = "mt-4 text-center text-sm text-red-400 font-medium";
                        status.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerText = "Envoyer ma demande";
                    })
                }
            }).catch(error => {
                status.innerText = "❌ Erreur de connexion au serveur.";
                status.className = "mt-4 text-center text-sm text-red-400 font-medium";
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Envoyer ma demande";
            });
        }

        if (form) {
            form.addEventListener("submit", handleSubmit);
        }
    </script>
