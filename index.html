<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Paiement VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation d'apparition douce */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

    <button onclick="openPaymentModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 px-8 rounded-2xl shadow-xl shadow-yellow-500/20 transition-all transform hover:scale-105 active:scale-95 uppercase tracking-wider">
        💎 Je demande mon Lien de paiement
    </button>

    <div id="paymentModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#1e293b] border border-white/10 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl relative animate-fade-in">
            
            <button onclick="closePaymentModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white text-2xl transition-colors">&times;</button>
            
            <h2 class="text-2xl font-bold text-white mb-2">Lien de paiement  💳</h2>
            <p class="text-gray-400 text-sm mb-6">Entrez votre email pour recevoir votre lien.</p>
            
            <form id="paymentForm" action="https://formspree.io/f/xbdazkbd" method="POST" class="space-y-4">
                <div class="relative">
                    <input type="email" name="email" id="userEmail" required placeholder="votre@email.com" 
                        class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-yellow-500 transition-colors placeholder:text-gray-600">
                </div>
                
                <input type="hidden" name="_subject" value="Nouvelle demande de lien de paiement VIP">

                <button type="submit" id="btnSubmitPayment" class="w-full bg-yellow-500 text-black font-extrabold py-3 rounded-xl hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-500/10">
                    Envoyer ma demande
                </button>
            </form>

            <p id="statusMsg" class="mt-4 text-center text-sm hidden font-medium"></p>
        </div>
    </div>

    <script>
        // Fonctions pour ouvrir/fermer la fenêtre
        window.openPaymentModal = () => {
            const modal = document.getElementById('paymentModal');
            if(modal) {
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Empêche le scroll en arrière-plan
            }
        };

        window.closePaymentModal = () => {
            const modal = document.getElementById('paymentModal');
            if(modal) {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto'; // Réactive le scroll
            }
        };

        // Fermer la modal si on clique en dehors du carré gris
        window.onclick = function(event) {
            const modal = document.getElementById('paymentModal');
            if (event.target == modal) {
                closePaymentModal();
            }
        }

        const form = document.getElementById("paymentForm");

        async function handleSubmit(event) {
            event.preventDefault();
            const status = document.getElementById("statusMsg");
            const btn = document.getElementById("btnSubmitPayment");
            const data = new FormData(event.target);

            btn.disabled = true;
            btn.innerText = "Envoi en cours...";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    status.innerText = "✅ Demande reçue ! On vous contacte par mail.";
                    status.className = "mt-4 text-center text-sm text-green-400 font-medium";
                    status.classList.remove('hidden');
                    form.reset();
                    
                    // Fermeture automatique après 3 secondes
                    setTimeout(() => {
                        closePaymentModal();
                        status.classList.add('hidden');
                        btn.disabled = false;
                        btn.innerText = "Envoyer ma demande";
                    }, 3000);
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.innerText = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.innerText = "❌ Erreur lors de l'envoi.";
                        }
                        status.className = "mt-4 text-center text-sm text-red-400 font-medium";
                        status.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerText = "Envoyer ma demande";
                    })
                }
            }).catch(error => {
                status.innerText = "❌ Erreur de connexion au serveur.";
                status.className = "mt-4 text-center text-sm text-red-400 font-medium";
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Envoyer ma demande";
            });
        }

        if (form) {
            form.addEventListener("submit", handleSubmit);
        }
    </script>

</html>
