<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Paiement VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Favicons (corrigés pour GitHub Pages + dossier /assets/icons/) -->
<link rel="icon" type="image/png" sizes="96x96" href="./assets/icons/favicon-96x96.png" />
<link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
<link rel="shortcut icon" href="./assets/icons/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="MyWebSite" />
<link rel="manifest" href="./assets/icons/site.webmanifest" />
    <style>
        
        /* --- DÉFINITION DES VARIABLES --- */
        :root {
            --alert-bg: rgba(30, 41, 59, 0.95); /* Bleu ardoise transparent */
            --accent-color: #eab308;           /* Jaune de ton bouton */
            --text-body: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Animation d'apparition douce pour la modale */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- STYLE CORRIGÉ DE L'ALERTE --- */
        #alertMessage {
            position: fixed;
            top: -150px; /* Caché au dessus au début */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--alert-bg);
            backdrop-filter: blur(10px);
            color: var(--text-body);
            padding: 20px 25px;
            border-radius: 20px;
            border: 1px solid rgba(234, 179, 8, 0.3); /* Bordure jaune discrète */
            font-family: sans-serif;
            box-shadow: var(--shadow);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            overflow: hidden;
        }

        /* Classe pour afficher l'alerte */
        #alertMessage.show {
            top: 20px; 
        }

        .alert-icon {
            font-size: 2.5rem;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .alert-content {
            flex-grow: 1;
            line-height: 1.4;
        }

        .alert-content strong {
            color: var(--accent-color);
            display: block;
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* Barre de progression */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--accent-color);
            width: 100%;
            transform-origin: left;
            animation: shrink 60s linear forwards; /* 1 minutes avant disparition */
        }

        @keyframes shrink {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            #alertMessage { padding: 15px; }
            .alert-icon { font-size: 1.8rem; }
            .alert-content { font-size: 0.9rem; }
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">

    <button onclick="openPaymentModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 px-8 rounded-2xl shadow-xl shadow-yellow-500/20 transition-all transform hover:scale-105 active:scale-95 uppercase tracking-wider">
        💎 Je demande mon Lien de paiement
    </button>

    <div id="paymentModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#1e293b] border border-white/10 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl relative animate-fade-in">
            <button onclick="closePaymentModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white text-2xl transition-colors">&times;</button>
            <h2 class="text-2xl font-bold text-white mb-2">Lien de paiement 💳</h2>
            <p class="text-gray-400 text-sm mb-6">Entrez votre email pour recevoir votre lien.</p>
            <form id="paymentForm" action="https://formspree.io/f/xbdazkbd" method="POST" class="space-y-4">
                <input type="email" name="email" id="userEmail" required placeholder="votre@email.com" 
                    class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-yellow-500 transition-colors">
                <input type="hidden" name="_subject" value="Nouvelle demande de lien de paiement VIP">
                <button type="submit" id="btnSubmitPayment" class="w-full bg-yellow-500 text-black font-extrabold py-3 rounded-xl hover:bg-yellow-400 transition-all shadow-lg">
                    Envoyer ma demande
                </button>
            </form>
            <p id="statusMsg" class="mt-4 text-center text-sm hidden font-medium"></p>
        </div>
    </div>

    <div id="alertMessage"> 
        <div class="alert-icon">⚠️</div>
        <div class="alert-content">
            <strong>Une question ?</strong>
            Contactez-nous sur le Tchat Bleu en bas de l'écran a droit.
        </div>
        <div class="progress-bar"></div>
    </div>

    <script>
        // --- GESTION MODALE ---
        window.openPaymentModal = () => document.getElementById('paymentModal').classList.remove('hidden');
        window.closePaymentModal = () => document.getElementById('paymentModal').classList.add('hidden');

        // --- GESTION ALERTE ---
        window.onload = () => {
            const alert = document.getElementById('alertMessage');
            // Affiche l'alerte après 1 seconde
            setTimeout(() => {
                alert.classList.add('show');
            }, 1000);

            // Cache l'alerte après 61 secondes
            // (1s d'attente au début + 60s de barre de progression)
            setTimeout(() => {
                alert.classList.remove('show');
            }, 61000);
        };

        // Fermer l'alerte au clic
        document.getElementById('alertMessage').onclick = function() {
            this.classList.remove('show');
        };

        // --- FORMULAIRE FORMSPREE ---
        const form = document.getElementById("paymentForm");
        async function handleSubmit(event) {
            event.preventDefault();
            const status = document.getElementById("statusMsg");
            const btn = document.getElementById("btnSubmitPayment");
            const data = new FormData(event.target);
            btn.disabled = true;
            btn.innerText = "Envoi en cours...";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    status.innerText = "✅ Demande reçue ! On vous contacte par mail.";
                    status.className = "mt-4 text-center text-sm text-green-400 font-medium";
                    status.classList.remove('hidden');
                    form.reset();
                    setTimeout(() => { closePaymentModal(); status.classList.add('hidden'); btn.disabled = false; btn.innerText = "Envoyer ma demande"; }, 3000);
                } else {
                    status.innerText = "❌ Erreur lors de l'envoi.";
                    status.classList.remove('hidden');
                    btn.disabled = false;
                }
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>

    <script type="text/javascript">
        window.$crisp=[];window.CRISP_WEBSITE_ID="6d5abd7e-ed07-4bbf-a4eb-af5ef15c1598";
        (function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();
    </script>
</body>
</html>
